system:
  timezone: America/Denver
  collection_interval_minutes: 15
  report_time: 08:00
  db_path: data/safety_monitor.db
  log_path: logs/safety_monitor.log

web:
  host: 0.0.0.0
  port: 8000
  title: Piasentin Ranch and properties safety monitor

ha:
  url: http://192.168.1.62:8123

properties:
- id: fm
  name: Forgetmenot
  subnet: 192.168.2.0/24
  enabled: true
  collectors:
  - type: eg4
    host: 192.168.2.49
    port: 8000
  - type: victron
    host: 192.168.2.132
    mqtt_port: 1883
  - type: hubitat_cloud
    endpoint: http://192.168.2.25/apps/api/14/devices/all
    primary_temp_sensor: Forget Deck temperature
  alerts:
    outdoor_sensors:
    - Forget Deck temperature
    outdoor_temp_warning: 15.0
    outdoor_temp_critical: 0.0
    indoor_temp_warning: 40.0
    indoor_temp_critical: 32.0
    temperature_cooldown_minutes: 60
    battery_low_threshold_percent: 20.0
    battery_critical_threshold_percent: 10.0
    battery_cooldown_minutes: 120
    offline_timeout_minutes: 30
    offline_cooldown_minutes: 120
    smoke_sustain_minutes: 3
    smoke_cooldown_minutes: 60
    smoke_mute_default_minutes: 60
    temp_graph_hours: 24
    exclude_sensors: []
    battery_exclude_devices: []
    water_exclude_sensors: []
    suppress_maker_devices: []
    battery_pushover_enabled: true
    offline_pushover_enabled: true
    water_pushover_enabled: true
    temperature_pushover_enabled: true
    smoke_pushover_enabled: true
    suppress_maker_device_alerts: false

- id: hc
  name: High Country
  subnet: 192.168.4.0/24
  enabled: true
  device_activity:
    warning_minutes: 360
    critical_minutes: 4320
  alerts:
    outdoor_sensors:
    - 2F-FB-C-T
    - OUT-N-T
    - new garage motion sensor
    outdoor_temp_warning: 15.0
    outdoor_temp_critical: 0.0
    water_valve_exclude_ids:
    - "39"
    water_cutoff_service_on_map:
      "82": "on"
    indoor_temp_warning: 40.0
    indoor_temp_critical: 32.0
    temperature_cooldown_minutes: 60
    battery_low_threshold_percent: 20.0
    battery_critical_threshold_percent: 10.0
    battery_cooldown_minutes: 120
    offline_timeout_minutes: 30
    offline_cooldown_minutes: 120
    smoke_sustain_minutes: 3
    smoke_cooldown_minutes: 60
    smoke_mute_default_minutes: 60
    temp_graph_hours: 24
    exclude_sensors: []
    battery_exclude_devices: []
    water_exclude_sensors: []
    suppress_maker_devices: []
    battery_pushover_enabled: true
    offline_pushover_enabled: true
    water_pushover_enabled: true
    temperature_pushover_enabled: true
    smoke_pushover_enabled: true
    suppress_maker_device_alerts: false
  collectors:
  - type: hubitat_cloud
    endpoint: http://192.168.4.91/apps/api/82/devices/all
    primary_temp_sensor: OUT-N-T
    water_cutoff_devices:
    - device_id: "82"
      actuator_type: relay
      state_attribute: switch
  - type: ha_api
    url: http://192.168.1.115:8123
    location_id: hc
    include_temps: false
    include_batteries: false
    include_tesla: true
    tesla_type: energy
    tesla_vehicle_prefix: piasentin

- id: lr
  name: Lariat
  subnet: 192.168.1.0/24
  enabled: true
  collectors:
  - type: hubitat_cloud
    endpoint: http://192.168.1.134/apps/api/28/devices/all
    primary_temp_sensor: Deck
  alerts:
    exclude_sensors:
    - rpoffice
    outdoor_sensors:
    - Coop sensor
    - Deck
    outdoor_temp_warning: 15.0
    outdoor_temp_critical: 0.0
    water_valve_service_on_map:
      "93": open
    indoor_temp_warning: 40.0
    indoor_temp_critical: 32.0
    temperature_cooldown_minutes: 60
    battery_low_threshold_percent: 20.0
    battery_critical_threshold_percent: 10.0
    battery_cooldown_minutes: 120
    offline_timeout_minutes: 30
    offline_cooldown_minutes: 120
    smoke_sustain_minutes: 3
    smoke_cooldown_minutes: 60
    smoke_mute_default_minutes: 60
    temp_graph_hours: 24
    battery_exclude_devices: []
    water_exclude_sensors: []
    suppress_maker_devices:
    - '149'
    battery_pushover_enabled: true
    offline_pushover_enabled: true
    water_pushover_enabled: true
    temperature_pushover_enabled: true
    smoke_pushover_enabled: true
    suppress_maker_device_alerts: false

- id: rd
  name: Redwood
  enabled: true
  collectors:
  - type: hubitat_cloud
    endpoint: https://cloud.hubitat.com/api/0709134d-2660-43bc-a6d5-a48d98e8ad1b/apps/58/devices/all
    primary_temp_sensor: sensor.rd_main_temp
  alerts:
    water_valve_service_on_map:
      "14": closed
    indoor_temp_warning: 40.0
    indoor_temp_critical: 32.0
    temperature_cooldown_minutes: 60
    outdoor_temp_warning: 15.0
    outdoor_temp_critical: 0.0
    battery_low_threshold_percent: 20.0
    battery_critical_threshold_percent: 10.0
    battery_cooldown_minutes: 120
    offline_timeout_minutes: 30
    offline_cooldown_minutes: 120
    smoke_sustain_minutes: 3
    smoke_cooldown_minutes: 60
    smoke_mute_default_minutes: 60
    temp_graph_hours: 24
    outdoor_sensors: []
    exclude_sensors: []
    battery_exclude_devices: []
    water_exclude_sensors: []
    suppress_maker_devices: []
    battery_pushover_enabled: true
    offline_pushover_enabled: true
    water_pushover_enabled: true
    temperature_pushover_enabled: true
    smoke_pushover_enabled: true
    suppress_maker_device_alerts: false

alerts:
  temperature:
    enabled: true
    threshold_fahrenheit: 40
    critical_fahrenheit: 32
    graph_hours: 24
    indoor_only: true
    pushover_enabled: true
    cooldown_minutes: 60
  battery:
    enabled: true
    low_threshold_percent: 20
    critical_threshold_percent: 10
    exclude_devices: []
    pushover_enabled: true
    cooldown_minutes: 120
  offline:
    enabled: true
    timeout_minutes: 30
    pushover_enabled: true
    cooldown_minutes: 120
  water:
    enabled: true
    pushover_enabled: true
    exclude_sensors: []
  smoke:
    enabled: true
    sustain_minutes: 3
    cooldown_minutes: 60
    pushover_enabled: true
    pushover_priority: 1
    mute_default_minutes: 60

device_activity:
  warning_minutes: 120
  critical_minutes: 1440
